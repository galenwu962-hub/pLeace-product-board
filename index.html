<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>产品调整会审仪表盘</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Product Change Review Board</p>
          <h1>产品调整会审仪表盘</h1>
        </div>
      </header>

      <section class="control-strip" aria-label="筛选控制">
        <label class="type-filter-control">
          <span>事项类别</span>
          <select id="typeFilter" aria-label="事项类别筛选">
            <option value="all">全部事项</option>
            <option value="launch">上架</option>
            <option value="retire">下架</option>
            <option value="optimize">调优</option>
          </select>
        </label>
        <div class="toolbar-actions">
          <div class="legend">
            <span><i class="dot hot"></i>热厨</span>
            <span><i class="dot drink"></i>水吧</span>
            <span><i class="dot bake"></i>烘焙</span>
          </div>
          <button class="export-button" id="exportPdfButton" type="button">一键导出 PDF</button>
        </div>
      </section>

      <section class="department-grid" id="departmentGrid" aria-label="部门产品调整列表"></section>

      <section class="review-section">
        <div class="section-heading">
          <p class="eyebrow">Review Decisions</p>
          <h2>会审部门意见</h2>
          <span class="save-state" id="saveState">内容自动保存</span>
        </div>
        <div class="review-grid" id="reviewGrid"></div>
      </section>
    </main>

    <script src="./config.js?v=aliyun-sync-v3"></script>
    <script src="./app.js?v=aliyun-sync-v3"></script>
  </body>
</html>
