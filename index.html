<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>产品调整会审仪表盘</title>
    <link rel="stylesheet" href="./styles.css?v=image-clear-v1" />
  </head>
  <body>
    <main class="dashboard-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">pLeace product board / pass rail</p>
          <h1>今天哪些菜，必须在会审桌上过一遍？</h1>
          <p class="hero-note">把产品事项当作厨房出品票处理：上架、下架、调优按轨道分区，部门像印章一样落在票面上，现场一眼知道谁负责、何时执行、哪里还缺口径。</p>
        </div>
      </header>

      <section class="control-strip" aria-label="筛选控制">
        <label class="type-filter-control">
          <span>事项类别</span>
          <select id="typeFilter" aria-label="事项类别筛选">
            <option value="all">全部事项</option>
            <option value="launch">上架</option>
            <option value="retire">下架</option>
            <option value="optimize">调优</option>
          </select>
        </label>
        <div class="toolbar-actions">
          <div class="legend">
            <span><i class="dot hot"></i>热厨</span>
            <span><i class="dot drink"></i>水吧</span>
            <span><i class="dot bake"></i>烘焙</span>
          </div>
          <div class="export-actions" aria-label="导出">
            <button class="export-button" id="exportImageButton" type="button">保存图片</button>
            <button class="export-button export-button-secondary" id="exportMarkdownButton" type="button">导出 MD</button>
            <button class="clear-button" id="clearAllButton" type="button">清空全部</button>
          </div>
        </div>
      </section>

      <section class="department-grid" id="departmentGrid" aria-label="部门产品调整列表"></section>

      <section class="review-section">
        <div class="section-heading">
          <p class="eyebrow">Review Decisions</p>
          <h2>会审部门意见</h2>
          <span class="save-state" id="saveState">内容自动保存</span>
        </div>
        <div class="review-grid" id="reviewGrid"></div>
      </section>
    </main>

    <script src="./config.js?v=aliyun-sync-v3"></script>
    <script src="./app.js?v=image-clear-v1"></script>
  </body>
</html>
